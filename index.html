  <style>
    :root{
      --bg:#0f172a;
      --bg2:#111827;
      --panel:rgba(30,41,59,.92);
      --panel-dark:#0b1220;

      --cyan:#06b6d4;
      --cyan2:#67e8f9;
      --blue:#3b82f6;
      --violet:#8b5cf6;
      --pink:#ec4899;

      --salmon:#ff8a80;
      --salmon2:#ffb199;
      --green:#22c55e;
      --yellow:#fde047;

      --safe1:#bfdbfe;
      --safe2:#dbeafe;

      --risk1:#fecaca;
      --risk2:#fee2e2;

      --leader1:#c4b5fd;
      --leader2:#ddd6fe;

      --faq:#cbd5e1;

      --text:#ffffff;
      --textDark:#0f172a;
      --muted:#94a3b8;
      --line:rgba(255,255,255,.14);
    }
    *{box-sizing:border-box}
    html{scroll-behavior:smooth}

    body{
      margin:0;
      font-family:Arial, Helvetica, sans-serif;
      background:
        radial-gradient(circle at top left, rgba(59,130,246,.18), transparent 24%),
        radial-gradient(circle at top right, rgba(236,72,153,.12), transparent 22%),
        linear-gradient(180deg,var(--bg),var(--bg2));
      color:var(--text);
      padding:24px;
      text-align:center;
    }

    .container{
      max-width:1100px;
      margin:auto;
      background:var(--panel);
      border-radius:28px;
      padding:30px;
      box-shadow:0 20px 50px rgba(0,0,0,.35);
      overflow:hidden;
    }

    .hero{
      background:linear-gradient(135deg,#06b6d4,#3b82f6,#8b5cf6,#ec4899);
      border-radius:24px;
      padding:42px 24px;
      margin-bottom:28px;
      box-shadow:0 16px 36px rgba(59,130,246,.25);
    }

    .heroBadge{
      display:inline-block;
      padding:8px 16px;
      border-radius:999px;
      background:rgba(255,255,255,.2);
      border:1px solid rgba(255,255,255,.22);
      font-size:13px;
      font-weight:700;
      margin-bottom:14px;
      letter-spacing:.03em;
    }

    h1{
      font-size:48px;
      margin:0 0 10px;
      line-height:1.05;
    }

    .hero p{
      font-size:18px;
      max-width:760px;
      margin:0 auto;
      line-height:1.6;
    }

    .liveStats{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:12px;
      margin-top:22px;
    }

    .statCard{
      background:rgba(255,255,255,.18);
      border-radius:16px;
      padding:14px;
      font-weight:700;
      font-size:14px;
      backdrop-filter:blur(6px);
    }

    .anchorLinks{
      margin:28px 0 8px;
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      justify-content:center;
    }

    .anchorLinks a{
      padding:10px 14px;
      border-radius:999px;
      background:rgba(255,255,255,.12);
      border:1px solid rgba(255,255,255,.15);
      color:white;
      text-decoration:none;
      font-weight:700;
      font-size:14px;
    }

    .anchorLinks a:hover{
      background:rgba(255,255,255,.2);
    }

    .jobInput,
    .emailInput{
      padding:14px;
      border-radius:12px;
      border:none;
      width:80%;
      max-width:430px;
      font-size:16px;
    }

    .emailInput{
      background:#ffffff;
      color:#111111;
      border:2px solid #3b82f6;
      box-shadow:0 0 0 2px rgba(59,130,246,.2);
    }

    .emailInput:focus{
      outline:none;
      border:2px solid #06b6d4;
      box-shadow:0 0 10px rgba(6,182,212,.5);
    }

    button{
      cursor:pointer;
      border:none;
      transition:.18s ease;
    }

    button:hover{
      transform:translateY(-1px);
    }

    .start{
      background:linear-gradient(135deg,var(--cyan),var(--cyan2));
      padding:14px 22px;
      border-radius:14px;
      font-weight:700;
      color:black;
      font-size:16px;
      margin:6px;
    }

    .secondary{
      background:white;
      color:black;
      padding:12px 20px;
      border-radius:12px;
      font-weight:700;
      font-size:15px;
      margin:6px;
    }

    .answer{
      display:block;
      width:100%;
      max-width:560px;
      margin:10px auto;
      padding:14px;
      border-radius:14px;
      background:#334155;
      color:white;
      font-size:16px;
      transition:all .15s ease;
    }

    .answer:hover{
      background:#475569;
      transform:translateY(-2px);
    }

    .selected{
      background:linear-gradient(135deg,var(--salmon),var(--salmon2)) !important;
      color:#111111 !important;
      transform:scale(1.06);
      box-shadow:
        0 0 0 4px rgba(255,138,128,0.25),
        0 10px 25px rgba(0,0,0,0.35);
    }

    .progressWrap{
      max-width:620px;
      margin:0 auto 18px;
      text-align:left;
    }

    .progressLabel{
      color:#cbd5e1;
      font-size:14px;
      margin-bottom:8px;
      font-weight:700;
    }

    .progressBar{
      width:100%;
      height:14px;
      background:#1e293b;
      border-radius:999px;
      overflow:hidden;
    }

    .progressFill{
      height:100%;
      background:linear-gradient(90deg,#06b6d4,#3b82f6,#8b5cf6);
      width:0%;
      transition:width .25s ease;
    }

    .trendAlert{
      background:#7c2d12;
      padding:10px;
      border-radius:10px;
      font-weight:700;
      margin-bottom:12px;
    }

    .resultCard{
      background:var(--panel-dark);
      border-radius:20px;
      padding:26px;
      margin-top:20px;
      border:2px solid var(--cyan);
      box-shadow:0 8px 24px rgba(0,0,0,.18);
    }

    .resultLabel{
      color:#cbd5e1;
      font-size:13px;
      font-weight:700;
      text-transform:uppercase;
      letter-spacing:.08em;
    }

    .resultScore{
      font-size:72px;
      font-weight:700;
      background:linear-gradient(135deg,#67e8f9,#3b82f6,#8b5cf6);
      -webkit-background-clip:text;
      background-clip:text;
      color:transparent;
      line-height:1;
      margin-top:8px;
    }

    .resultStatus{
      font-size:30px;
      font-weight:700;
      margin-top:10px;
    }

    .percentile{
      color:var(--yellow);
      font-weight:700;
      margin-top:12px;
      font-size:18px;
    }

    .scarcity{
      margin-top:14px;
      font-weight:700;
      color:#fca5a5;
    }

    .compareLine{
      color:#93c5fd;
      font-weight:700;
      margin-top:14px;
    }

    .shareRow{
      margin-top:16px;
    }

    .shareX,
    .shareReddit,
    .shareCopy{
      padding:12px 18px;
      border-radius:12px;
      font-weight:700;
      font-size:15px;
      margin:6px;
    }

    .shareX{
      background:black;
      color:white;
    }

    .shareReddit{
      background:#ff4500;
      color:white;
    }

    .shareCopy{
      background:var(--green);
      color:black;
    }

    .shareStats{
      margin-top:16px;
      font-weight:700;
      color:#fef08a;
    }

    .shareUrl{
      display:none;
    }

    .section{
      margin-top:42px;
      padding:26px;
      border-radius:22px;
      text-align:left;
      color:var(--textDark);
      box-shadow:0 10px 24px rgba(0,0,0,.08);
    }

    .section h3{
      margin-top:0;
      margin-bottom:8px;
    }

    .safeSection{
