<style>

:root{

--bg:#0f172a;
--bg2:#111827;

--cyan:#06b6d4;
--cyan2:#67e8f9;

--salmon:#ff8a80;

--green:#22c55e;

}

*{box-sizing:border-box}

html{scroll-behavior:smooth}

body{

margin:0;
font-family:Arial,Helvetica,sans-serif;

background:
radial-gradient(circle at top left, rgba(59,130,246,.18), transparent 24%),
radial-gradient(circle at top right, rgba(236,72,153,.12), transparent 22%),
linear-gradient(180deg,var(--bg),var(--bg2));

color:white;
padding:24px;
text-align:center;

}

.container{

max-width:1050px;
margin:auto;

background:rgba(30,41,59,.9);

border-radius:26px;
padding:30px;

box-shadow:0 20px 50px rgba(0,0,0,.35);

}

/* HERO */

.hero{

background:linear-gradient(135deg,#06b6d4,#3b82f6,#8b5cf6,#ec4899);

border-radius:22px;

padding:40px;

margin-bottom:30px;

}

.heroBadge{

background:rgba(255,255,255,.2);
padding:8px 16px;
border-radius:999px;

font-size:13px;
font-weight:bold;

display:inline-block;

margin-bottom:14px;

}

h1{

font-size:46px;
margin:0 0 10px;

}

.hero p{

font-size:18px;
max-width:700px;
margin:auto;

}

/* LIVE STATS */

.liveStats{

display:grid;
grid-template-columns:repeat(3,1fr);
gap:12px;

margin-top:20px;

}

.statCard{

background:rgba(255,255,255,.18);
border-radius:14px;

padding:14px;

font-weight:bold;
font-size:14px;

}

/* QUIZ BUTTONS */

.answer{

width:80%;
max-width:620px;

margin:10px auto;

padding:14px;

border-radius:14px;
border:none;

background:#334155;

color:white;

font-size:16px;

cursor:pointer;

}

.answer:hover{

background:#475569;

}

.selected{

background:var(--salmon)!important;
color:#111;

transform:scale(1.05);

}

/* GENERAL BUTTON */

button{

cursor:pointer;

}

.start{

background:linear-gradient(135deg,var(--cyan),var(--cyan2));

padding:14px 22px;

border-radius:14px;
border:none;

font-weight:bold;

color:black;

}

.secondary{

background:white;

color:black;

padding:12px 20px;

border-radius:12px;
border:none;

}

/* SHARE */

.shareX{

background:black;
color:white;

padding:12px 18px;

border-radius:12px;
border:none;

}

.shareReddit{

background:#ff4500;
color:white;

padding:12px 18px;

border-radius:12px;
border:none;

}

.shareCopy{

background:var(--green);
color:black;

padding:12px 18px;

border-radius:12px;
border:none;

}

/* RESULT */

.resultCard{

background:#0b1220;

border-radius:20px;

padding:26px;

margin-top:20px;

border:2px solid var(--cyan);

}

.resultScore{

font-size:70px;
font-weight:bold;

background:linear-gradient(135deg,#67e8f9,#3b82f6,#8b5cf6);

-webkit-background-clip:text;
color:transparent;

}

.resultStatus{

font-size:30px;
font-weight:bold;

}

.percentile{

color:#fde047;

font-weight:bold;

margin-top:10px;

}

/* SHARE COUNT */

.shareStats{

margin-top:16px;

font-weight:bold;

color:#fef08a;

}

/* SECTIONS */

.section{

margin-top:40px;

padding:26px;

border-radius:20px;

text-align:left;

}

.safeSection{

background:linear-gradient(135deg,#dbeafe,#f0f9ff);

color:black;

}

.riskSection{

background:linear-gradient(135deg,#ffe4e6,#fff1f2);

color:black;

}

.leaderboardSection{

background:linear-gradient(135deg,#ede9fe,#faf5ff);

color:black;

}

.faqSection{

background:white;

color:black;

}

.infoSection{

background:#f8fafc;

color:black;

}

.cards{

display:grid;

grid-template-columns:repeat(auto-fit,minmax(140px,1fr));

gap:12px;

margin-top:16px;

}

.jobCard{

background:white;

padding:14px;

border-radius:14px;

text-align:center;

font-weight:bold;

}

/* FAQ */

details{

background:#f8fafc;

border-radius:14px;

padding:14px;

margin-bottom:10px;

border:1px solid #e2e8f0;

}

summary{

font-weight:bold;
cursor:pointer;

}

.faqAnswer{

margin-top:10px;

color:#334155;

}

/* LINKS */

.anchorLinks{

margin-top:30px;

display:flex;
flex-wrap:wrap;

gap:10px;

justify-content:center;

}

.anchorLinks a{

padding:10px 14px;

border-radius:999px;

background:rgba(255,255,255,.12);

border:1px solid rgba(255,255,255,.15);

color:white;

text-decoration:none;

font-weight:bold;

}

footer{

margin-top:40px;

font-size:14px;

color:#cbd5e1;

}

footer a{

color:#cbd5e1;

text-decoration:none;

}

footer a:hover{

color:white;

}

</style>

</head>

<div class="liveStats">

</div>

<div class="statCard">

</div>

<div class="statCard">

</div>

</div>

</section>

<div id="game"></div>
