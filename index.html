<meta charset="UTF-8">
<title>AI Job Test</title>

<style>

body{
font-family:Arial,Helvetica,sans-serif;
background:#0f172a;
color:white;
text-align:center;
padding:40px;
}

.container{
max-width:700px;
margin:auto;
background:#1e293b;
padding:30px;
border-radius:20px;
}

button{
padding:15px 20px;
margin:10px;
font-size:16px;
border:none;
border-radius:10px;
cursor:pointer;
}

.start{
background:#06b6d4;
color:black;
font-weight:bold;
}

.answer{
background:#334155;
color:white;
width:80%;
}

.answer:hover{
background:#475569;
}

.share{
background:#22c55e;
color:black;
}

.email{
padding:12px;
width:70%;
border-radius:8px;
border:none;
margin-top:10px;
}

.result{
font-size:26px;
margin-top:20px;
}

.score{
font-size:40px;
margin:20px;
color:#06b6d4;
}

</style>

</head>

<body>

<div class="container">

<h1>AI Job Test</h1>

<p>Will AI replace your job? Take the 30-second test.</p>

<div id="game"></div>

</div>

<script>

const questions=[
"Does your job require human empathy?",
"Do you solve unexpected problems often?",
"Do you interact with people face-to-face?",
"Does your work involve creativity?",
"Do you make complex decisions?",
"Does your job depend on trust or relationships?",
"Is your work mostly repetitive?",
"Could software automate most of your tasks?",
"Do you regularly learn new skills?",
"Do you work in unpredictable environments?"
]

let job=""
let index=0
let score=0

function start(){

job=document.getElementById("job").value

if(job==""){
alert("Enter your job first")
return
}

index=0
score=0
showQuestion()

}

function showStart(){

document.getElementById("game").innerHTML=`

<h2>What is your job?</h2>

<input id="job" class="email" placeholder="Example: Accountant">

<br><br>

<button class="start" onclick="start()">
Start Test
</button>

`

}

function showQuestion(){

if(index>=questions.length){

showResult()
return

}

document.getElementById("game").innerHTML=`

<p>Question ${index+1} / ${questions.length}</p>

<h2>${questions[index]}</h2>

<button class="answer" onclick="answer(2)">Yes</button>
<br>
<button class="answer" onclick="answer(1)">Sometimes</button>
<br>
<button class="answer" onclick="answer(0)">No</button>

`

}

function answer(value){

if(index==6||index==7){

value=2-value

}

score+=value

index++

showQuestion()

}

function showResult(){

let result=""

if(score>=16){

result="Very Hard to Replace"

}

else if(score>=11){

result="Moderately Safe"

}

else if(score>=6){

result="At Risk"

}

else{

result="High AI Risk"

}

let aiScore=Math.round((score/20)*100)

document.getElementById("game").innerHTML=`

<h2>AI Risk Result for ${job}</h2>

<div class="score">${aiScore}/100</div>

<div class="result">${result}</div>

<p>Your career AI safety score</p>

<h3>Get full AI-proof career report</h3>

<input class="email" placeholder="Enter your email">

<br>

<button class="start">
Unlock Full Report
</button>

<br><br>

<button class="share" onclick="shareResult()">
Share Result
</button>

<br>

<button class="start" onclick="showStart()">
Try Again
</button>

`

}

function shareResult(){

const text="I tested my AI job risk. Try it yourself!"

const url=window.location.href

navigator.clipboard.writeText(url)

alert("Link copied! Share it on X or LinkedIn.")

}

showStart()

</script>

</body>
</html>
