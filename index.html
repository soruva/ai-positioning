<style>

body{
font-family:Arial,Helvetica,sans-serif;
background:#0f172a;
color:white;
text-align:center;
padding:40px;
}

.container{
max-width:700px;
margin:auto;
background:#1e293b;
padding:30px;
border-radius:20px;
}

h1{
font-size:36px;
}

button{
padding:15px 20px;
margin:10px;
font-size:16px;
border:none;
border-radius:10px;
cursor:pointer;
transition:0.2s;
}

.start{
background:#06b6d4;
color:black;
font-weight:bold;
}

.answer{
background:#334155;
color:white;
width:80%;
}

.answer:hover{
background:#475569;
}

.selected{
background:#ff8a80 !important;
color:black !important;
transform:scale(1.05);
}

.share{
background:#22c55e;
color:black;
}

.email{
padding:12px;
width:70%;
border-radius:8px;
border:none;
margin-top:10px;
}

.result{
font-size:26px;
margin-top:20px;
}

.score{
font-size:42px;
margin:20px;
color:#06b6d4;
}

footer{
margin-top:40px;
font-size:14px;
}

color:#94a3b8;
text-decoration:none;

}

}

</style>

<body>

<div class="container">

<h1>AI Job Test</h1>

<p>Will AI replace your job? Take the 30-second test.</p>

<div id="game"></div>

</div>

<script>

const questions=[
"Does your job require human empathy?",
"Do you solve unexpected problems often?",
"Do you interact with people face-to-face?",
"Does your work involve creativity?",
"Do you make complex decisions?",
"Does your job depend on trust or relationships?",
"Is your work mostly repetitive?",
"Could software automate most of your tasks?",
"Do you regularly learn new skills?",
"Do you work in unpredictable environments?"
]

let job=""
let index=0
let score=0

function start(){

job=document.getElementById("job").value

if(job==""){
alert("Enter your job first")
return
}

index=0
score=0

showQuestion()

}

function showStart(){

document.getElementById("game").innerHTML=`

<h2>What is your job?</h2>

<input id="job" class="email" placeholder="Example: Accountant">

<br><br>

<button class="start" onclick="start()">
Start Test
</button>

`

}

function showQuestion(){

if(index>=questions.length){

showResult()
return

}

document.getElementById("game").innerHTML=`

<p>Question ${index+1} / ${questions.length}</p>

<h2>${questions[index]}</h2>

<button class="answer" onclick="answer(this,2)">Yes</button>
<br>
<button class="answer" onclick="answer(this,1)">Sometimes</button>
<br>
<button class="answer" onclick="answer(this,0)">No</button>

`

}

function answer(button,value){

button.classList.add("selected")

if(index==6||index==7){
value=2-value
}

score+=value

setTimeout(()=>{

index++
showQuestion()

},250)

}

function showResult(){

let result=""

if(score>=16){
result="Very Hard to Replace"
}
else if(score>=11){
result="Moderately Safe"
}
else if(score>=6){
result="At Risk"
}
else{
result="High AI Risk"
}

let aiScore=Math.round((score/20)*100)

document.getElementById("game").innerHTML=`

<h2>AI Risk Result for ${job}</h2>

<div class="score">${aiScore}/100</div>

<div class="result">${result}</div>

<p>Your career AI safety score</p>

<h3>Share your result</h3>

<button class="share" onclick="shareX()">
Share on X
</button>

<button class="share" onclick="shareReddit()">
Share on Reddit
</button>

<br><br>

<h3>Get full AI-proof career report</h3>

<input class="email" placeholder="Enter your email">

<br>

<button class="start">
Unlock Full Report
</button>

<br><br>

<button class="start" onclick="showStart()">
Try Again
</button>

`

}

function shareX(){

const text="I tested my AI job risk score. Try yours!"
const url=window.location.href

window.open(`https://twitter.com/intent/tweet?text=${text}&url=${url}`)

}

function shareReddit(){

const url=window.location.href

window.open(`https://www.reddit.com/submit?url=${url}&title=AI Job Test`)

}

showStart()

</script>
