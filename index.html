<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AI Job Test</title>

<style>

body{
font-family:Arial,Helvetica,sans-serif;
background:#0f172a;
color:white;
text-align:center;
padding:40px;
}

.container{
max-width:700px;
margin:auto;
background:#1e293b;
padding:30px;
border-radius:20px;
}

button{
padding:15px 20px;
margin:10px;
font-size:16px;
border:none;
border-radius:10px;
cursor:pointer;
}

.start{
background:#06b6d4;
color:black;
font-weight:bold;
}

.answer{
background:#334155;
color:white;
width:80%;
}

.answer:hover{
background:#475569;
}

.next{
background:#06b6d4;
color:black;
}

.result{
font-size:26px;
margin-top:20px;
}

.progress{
margin-bottom:20px;
}

</style>

</head>

<body>

<div class="container">

<h1>AI Job Test</h1>

<p>Will AI replace your job? Take the 30-second test.</p>

<div id="game"></div>

</div>

<script>

const questions=[
"Does your job require human empathy?",
"Do you solve unexpected problems often?",
"Do you interact with people face-to-face?",
"Does your work involve creativity?",
"Do you make complex decisions?",
"Does your job depend on trust or relationships?",
"Is your work mostly repetitive?",
"Could software automate most of your tasks?",
"Do you regularly learn new skills?",
"Do you work in unpredictable environments?"
]

let index=0
let score=0

function startGame(){

index=0
score=0
showQuestion()

}

function showQuestion(){

const game=document.getElementById("game")

if(index>=questions.length){

showResult()
return

}

game.innerHTML=`

<div class="progress">
Question ${index+1} / ${questions.length}
</div>

<h2>${questions[index]}</h2>

<button class="answer" onclick="answer(2)">Yes</button>

<button class="answer" onclick="answer(1)">Sometimes</button>

<button class="answer" onclick="answer(0)">No</button>

`

}

function answer(value){

if(index==6||index==7){

value=2-value

}

score+=value

index++

showQuestion()

}

function showResult(){

const game=document.getElementById("game")

let result=""

if(score>=16){

result="Very Hard to Replace"

}

else if(score>=11){

result="Moderately Safe"

}

else if(score>=6){

result="At Risk"

}

else{

result="High AI Risk"

}

game.innerHTML=`

<div class="result">

Your Result: <b>${result}</b>

</div>

<p>Score: ${score} / 20</p>

<button class="start" onclick="startGame()">Try Again</button>

`

}

document.getElementById("game").innerHTML=`

<button class="start" onclick="startGame()">

Start Test

</button>

`

</script>

</body>
</html>
